name: aleedz
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+2

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.8.0+1
  http: ^1.3.0
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  geolocator: ^14.0.0
  image_picker: ^1.1.2
  image: ^4.1.3
  collection: ^1.19.1
  google_maps_flutter: ^2.12.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  flutter_image_compress: ^2.4.0
  dropdown_search: ^5.0.6
  path_provider: ^2.1.2
  path: ^1.9.0
  table_calendar: ^3.2.0
  fl_chart: ^1.0.0
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.4
  mobile_scanner: ^7.0.1
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter_icons:
  image_path: "assets/images/logo.png" # your base icon file
  android: true
  ios: true
  remove_alpha_ios: true


  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/actions/
    - assets/fonts/




  fonts:
     - family: PlusJakartaSans
       fonts:
        - asset: assets/fonts/PlusJakartaSans-VariableFont_wght.ttf

  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
